services:
  db:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_DB: school_crm
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    volumes:
      - school_crm_pgdata:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  server:
    build: ./server
    restart: always
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: school_crm
      DB_USER: postgres
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      JWT_SECRET: ${JWT_SECRET:-school-crm-secret-key-change-in-production}
      PORT: 5001
    ports:
      - "5001:5001"

  client:
    build: ./client
    restart: always
    depends_on:
      - server
    ports:
      - "3050:80"

volumes:
  school_crm_pgdata:
